<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browser Frame Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0a0a; padding: 40px; font-family: sans-serif; color: #f0f0f0; }
  h2 { margin-bottom: 24px; font-size: 14px; color: #808080; letter-spacing: 0.05em; }

  .browser-frame {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 96px;
    margin-bottom: 24px;
  }

  .browser-window {
    border-radius: 12px;
    overflow: hidden;
  }

  .browser-chrome {
    display: flex;
    align-items: center;
    gap: 6px;
    height: 32px;
    padding: 0 12px;
    background: #2a2a2a;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
  .dot-red { background: #ff5f57; }
  .dot-yellow { background: #febc2e; }
  .dot-green { background: #28c840; }

  .browser-content {
    overflow: hidden;
  }

  .browser-content img {
    width: 100%;
    display: block;
  }

  /* Placeholder for demo */
  .placeholder {
    width: 100%;
    aspect-ratio: 8/5;
    background: linear-gradient(135deg, #2a2a2a 0%, #1f1f1f 50%, #2a2a2a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    color: #555;
    font-size: 14px;
  }
</style>
</head>
<body>

<h2>BROWSER FRAME PREVIEW — WITH IMAGE</h2>
<div class="browser-frame">
  <div class="browser-window">
  <div class="browser-chrome">
    <span class="dot dot-red"></span>
    <span class="dot dot-yellow"></span>
    <span class="dot dot-green"></span>
  </div>
  <div class="browser-content">
    <img src="public/images/whales-market/layout-1.png" alt="Whales Market layout 1">
  </div>
  </div>
</div>

<h2>BROWSER FRAME PREVIEW — PLACEHOLDER (NO IMAGE)</h2>
<div class="browser-frame">
  <div class="browser-window">
  <div class="browser-chrome">
    <span class="dot dot-red"></span>
    <span class="dot dot-yellow"></span>
    <span class="dot dot-green"></span>
  </div>
  <div class="browser-content">
    <div class="placeholder">1920 × 1200</div>
  </div>
  </div>
</div>

</body>
</html>
